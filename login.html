<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5" style="max-width: 340px;">
      <h2 class="mb-4">Login</h2>
      <form action="/login" method="POST">
        <div class="mb-3">
          <label for="username" class="form-label">username</label>
          <input type="text" id="username" name="username" class="form-control" autocomplete="username" />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">password</label>
          <input type="password" id="password" name="password" class="form-control" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">login</button>
        <a href="/signup" class="btn btn-secondary ms-2">create account</a>
      </form>
      <div id="error_message" class="mt-3 text-danger" style="display:none;">Bad login.</div>
    </div>
    <script>
      if (new URLSearchParams(location.search).get("error")) {
        document.getElementById("error_message").style.display = "";
      }
    </script>
  </body>
</html>
