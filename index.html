<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grant Horner's Bible-Reading System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="https://md-block.verou.me/md-block.js"></script>
    <script src="index.js" type="module"></script>
  </head>
  <body>
    <div class="container py-4">
      <header
        class="mb-4 pb-2 border-bottom d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3"
      >
        <h1 class="h3 mb-0 text-center text-md-start">
          Grant Horner's Bible-Reading System
        </h1>
        <div class="d-flex gap-2 justify-content-center">
          <button
            id="theme_toggle_button"
            class="btn btn-outline-secondary btn-sm"
          >
            Toggle Theme
          </button>
          <button id="instructions_button" class="btn btn-outline-info btn-sm">
            Instructions
          </button>
          <button id="my_progress_button" class="btn btn-outline-info btn-sm">
            My Progress
          </button>
        </div>
      </header>

      <main>
        <div class="card mb-4 shadow-sm">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-12">
                <div class="mb-3">
                  <label for="font_size_control" class="form-label fw-bold"
                    >Font Size</label
                  >
                  <input
                    type="range"
                    id="font_size_control"
                    class="form-range"
                    min="14"
                    max="100"
                    value="18"
                  />
                </div>
                <label for="resources_dropdown" class="form-label fw-bold"
                  >Resources</label
                >
                <div class="input-group">
                  <select id="resources_dropdown" class="form-select">
                    <option value="genesis" disabled>Genesis (N/A)</option>
                    <option value="exodus" disabled>Exodus (N/A)</option>
                    <option value="leviticus" disabled>Leviticus (N/A)</option>
                    <option value="numbers" disabled>Numbers (N/A)</option>
                    <option value="deuteronomy" disabled>
                      Deuteronomy (N/A)
                    </option>
                    <option value="joshua">Joshua</option>
                    <option value="judges" disabled>Judges (N/A)</option>
                    <option value="ruth" disabled>Ruth (N/A)</option>
                    <option value="1_samuel" disabled>1 Samuel (N/A)</option>
                    <option value="2_samuel" disabled>2 Samuel (N/A)</option>
                    <option value="1_kings" disabled>1 Kings (N/A)</option>
                    <option value="2_kings" disabled>2 Kings (N/A)</option>
                    <option value="1_chronicles" disabled>
                      1 Chronicles (N/A)
                    </option>
                    <option value="2_chronicles" disabled>
                      2 Chronicles (N/A)
                    </option>
                    <option value="ezra" disabled>Ezra (N/A)</option>
                    <option value="nehemiah" disabled>Nehemiah (N/A)</option>
                    <option value="esther" disabled>Esther (N/A)</option>
                    <option value="job" disabled>Job (N/A)</option>
                    <option value="psalms" disabled>Psalms (N/A)</option>
                    <option value="proverbs" disabled>Proverbs (N/A)</option>
                    <option value="ecclesiastes" disabled>
                      Ecclesiastes (N/A)
                    </option>
                    <option value="song_of_solomon" disabled>
                      Song of Solomon (N/A)
                    </option>
                    <option value="isaiah" disabled>Isaiah (N/A)</option>
                    <option value="jeremiah" disabled>Jeremiah (N/A)</option>
                    <option value="lamentations" disabled>
                      Lamentations (N/A)
                    </option>
                    <option value="ezekiel" disabled>Ezekiel (N/A)</option>
                    <option value="daniel" disabled>Daniel (N/A)</option>
                    <option value="hosea" disabled>Hosea (N/A)</option>
                    <option value="joel" disabled>Joel (N/A)</option>
                    <option value="amos" disabled>Amos (N/A)</option>
                    <option value="obadiah" disabled>Obadiah (N/A)</option>
                    <option value="jonah" disabled>Jonah (N/A)</option>
                    <option value="micah" disabled>Micah (N/A)</option>
                    <option value="nahum" disabled>Nahum (N/A)</option>
                    <option value="habakkuk" disabled>Habakkuk (N/A)</option>
                    <option value="zephaniah" disabled>Zephaniah (N/A)</option>
                    <option value="haggai" disabled>Haggai (N/A)</option>
                    <option value="zechariah" disabled>Zechariah (N/A)</option>
                    <option value="malachi" disabled>Malachi (N/A)</option>
                    <option value="matthew" disabled>Matthew (N/A)</option>
                    <option value="mark" disabled>Mark (N/A)</option>
                    <option value="luke" disabled>Luke (N/A)</option>
                    <option value="john" disabled>John (N/A)</option>
                    <option value="acts" disabled>Acts (N/A)</option>
                    <option value="romans" disabled>Roman (N/A)</option>
                    <option value="1_corinthians" disabled>
                      1 Corinthians (N/A)
                    </option>
                    <option value="2_corinthians" disabled>
                      2 Corinthians (N/A)
                    </option>
                    <option value="galatians" disabled>Galatians (N/A)</option>
                    <option value="ephesians" disabled>Ephesians (N/A)</option>
                    <option value="philippians" disabled>
                      Philippians (N/A)
                    </option>
                    <option value="colossians" disabled>
                      Colossians (N/A)
                    </option>
                    <option value="1_thessalonians" disabled>
                      1 Thessalonians (N/A)
                    </option>
                    <option value="2_thessalonians" disabled>
                      2 Thessalonians (N/A)
                    </option>
                    <option value="1_timothy" disabled>1 Timothy (N/A)</option>
                    <option value="2_timothy" disabled>2 Timothy (N/A)</option>
                    <option value="titus" disabled>Titus (N/A)</option>
                    <option value="philemon" disabled>Philemon (N/A)</option>
                    <option value="hebrew" disabled>Hebrew (N/A)</option>
                    <option value="james" disabled>James (N/A)</option>
                    <option value="1_peter" disabled>1 Peter (N/A)</option>
                    <option value="2_peter" disabled>2 Peter (N/A)</option>
                    <option value="1_john" disabled>1 John (N/A)</option>
                    <option value="2_john" disabled>2 John (N/A)</option>
                    <option value="3_john" disabled>3 John (N/A)</option>
                    <option value="jude" disabled>Jude (N/A)</option>
                    <option value="revelation" disabled>
                      Revelation (N/A)
                    </option>
                  </select>
                  <button
                    id="go_to_resource_button"
                    class="btn btn-outline-primary"
                  >
                    Go
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div
          class="bible-content-container p-3 mb-4 bg-body border rounded shadow-sm"
        >
          <md-block id="chapter_content"></md-block>
        </div>

        <nav class="d-flex justify-content-between mb-5">
          <button
            id="previous_chapter_button"
            class="btn btn-secondary btn-lg px-4"
            type="button"
            disabled
          >
            Previous
          </button>
          <button
            id="next_chapter_button"
            class="btn btn-primary btn-lg px-4"
            type="button"
          >
            Next
          </button>
        </nav>
      </main>
    </div>
    <div id="highlight_popup"></div>
    <div id="alert_container" class="position-fixed top-0 end-0 p-3"></div>
  </body>
</html>
