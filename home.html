<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ten List Bible</title>
    <link rel="icon" href="/favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container py-5" style="max-width: 480px;">
      <h1 class="h3 mb-3">Ten List Bible</h1>
      <p class="text-secondary mb-4">
        A reading app based on Grant Horner's Bible-Reading System. Read 10
        chapters a day — one from each of 10 lists organized by biblical genre.
        Each list cycles independently, so the combination of readings changes
        every day and never repeats.
      </p>
      <div class="d-flex gap-2">
        <a href="/login" class="btn btn-primary">Login</a>
        <a href="/signup" class="btn btn-outline-secondary">Create Account</a>
      </div>
    </main>
  </body>
</html>
