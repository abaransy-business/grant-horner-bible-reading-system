<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5" style="max-width: 340px;">
      <h2 class="mb-4">Create Account</h2>
      <form action="/signup" method="POST">
        <div class="mb-3">
          <label for="username" class="form-label">username</label>
          <input type="text" id="username" name="username" class="form-control" autocomplete="username" />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">password</label>
          <input type="password" id="password" name="password" class="form-control" autocomplete="new-password" />
        </div>
        <div class="mb-3">
          <label for="password_confirm" class="form-label">confirm password</label>
          <input type="password" id="password_confirm" name="password_confirm" class="form-control" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary">create account</button>
        <a href="/login" class="btn btn-link ps-3">log in</a>
      </form>
      <div id="error_message" class="mt-3 text-danger" style="display:none;"></div>
    </div>
    <script>
      const error = new URLSearchParams(location.search).get("error");
      if (error) {
        const el = document.getElementById("error_message");
        el.style.display = "";
        el.textContent = error === "mismatch" ? "Passwords do not match."
                       : error === "taken"    ? "Username already taken."
                       :                        "Could not create account.";
      }
    </script>
  </body>
</html>
